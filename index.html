<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Clock Toy Gym — Neural OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,800;9..144,900&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  /* Paper / inks */
  --face:#faf3df;
  --soft:#fbf3dc;
  --ink:#2a2018;
  --muted:#7a6a55;

  /* Board — terracotta on cream */
  --board:#d4814c;
  --board-edge:#7a3a1e;
  --board-shadow:rgba(60,28,14,.28);

  /* Hands */
  --hand-h:#a83232;        /* oxblood */
  --hand-m:#2d4a6b;        /* slate blue */
  --tick:#2a2018;

  /* Status */
  --ok:#5d8a47;            /* sage */
  --bad:#b34028;           /* rust */
  --warn:#cc9a3c;          /* mustard */

  /* Sky defaults (overridden dynamically) */
  --sky-top:#b8c8d0;
  --sky-bot:#e3d5b8;
  --sun:#f0b85e;
  --moon:#f5ebd0;

  /* Geometry scale */
  --r:22px;
  --r-sm:14px;
  --r-xs:10px;
  /* Shared width for the clock + slider stack so the rails align with the clock's edges. */
  --clock-width:min(380px,88vw);
  --shadow-card:0 6px 20px rgba(60,28,14,.18), 0 2px 4px rgba(60,28,14,.12);
  --shadow-deep:0 10px 30px rgba(60,28,14,.32), 0 4px 8px rgba(60,28,14,.16);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%}
body{
  font-family:'Quicksand',system-ui,-apple-system,'Segoe UI',sans-serif;
  font-weight:600;
  background:linear-gradient(180deg,var(--sky-top),var(--sky-bot));
  color:var(--ink);
  overflow-x:hidden;
  transition:background .8s ease;
  font-size:17px;
  letter-spacing:.005em;
  min-height:100vh;
}

/* ── Sky layer ─────────────────────────────────────────────── */
.sky{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.stars-svg{position:absolute;width:100%;height:100%;display:block}
.celestial-body{
  position:fixed;
  width:140px;height:140px;
  transform:translate(-50%,-50%);
  transition:left .8s ease,top .8s ease,opacity .8s ease,transform 1.2s ease,filter 1.2s ease;
  pointer-events:none;
  z-index:0;
  will-change:transform,filter;
}
.celestial-body svg{width:100%;height:100%;display:block;overflow:visible}
.hidden{opacity:0!important}
#stars{transition:opacity .8s ease}
@keyframes twinkle{0%{opacity:.3}100%{opacity:1}}

/* ── Board ─────────────────────────────────────────────────── */
.board{
  position:relative;z-index:1;
  max-width:580px;margin:0 auto;
  padding:18px 16px 36px;
  padding-top:150px;
  display:flex;flex-direction:column;gap:16px;
  min-height:100vh;
}

.hdr{
  display:flex;justify-content:space-between;align-items:center;gap:12px;
  background:var(--board);
  border:2px solid var(--board-edge);
  border-radius:var(--r);
  padding:14px 20px;
  box-shadow:var(--shadow-card);
}
.back-btn a{
  color:var(--ink);text-decoration:none;
  font-family:'Fraunces',serif;font-weight:600;font-style:italic;
  font-size:.92rem;opacity:.7;
  transition:opacity .2s;
}
.back-btn a:hover{opacity:1}
.gym-title{
  font-family:'Fraunces',serif;font-weight:900;
  font-size:1.45rem;color:var(--ink);
  text-align:center;flex:1;
  letter-spacing:-.015em;
  line-height:1;
}
.mode-pill{
  font-size:.72rem;font-weight:700;
  background:var(--face);
  border:1.5px solid var(--board-edge);
  padding:6px 12px;border-radius:999px;color:var(--ink);
  white-space:nowrap;
  letter-spacing:.04em;
  text-transform:uppercase;
}
.locale-toggle{
  font-family:'Fraunces',serif;
  font-weight:900;
  font-size:.78rem;
  letter-spacing:.06em;
  background:var(--hand-m);
  color:var(--face);
  border:1.5px solid #1a3450;
  padding:6px 11px;
  border-radius:999px;
  cursor:pointer;
  box-shadow:0 2px 0 #1a3450;
  transition:transform .08s ease,box-shadow .08s ease;
  user-select:none;
  min-width:42px;
}
.locale-toggle:active{transform:translateY(1px);box-shadow:0 1px 0 #1a3450}
.voice-toggle{
  font-size:.95rem;
  background:var(--face);
  color:var(--ink);
  border:1.5px solid var(--board-edge);
  padding:6px 9px;
  border-radius:999px;
  cursor:pointer;
  box-shadow:0 2px 0 var(--board-edge);
  transition:transform .08s ease,box-shadow .08s ease;
  user-select:none;
  line-height:1;
}
.voice-toggle:active{transform:translateY(1px);box-shadow:0 1px 0 var(--board-edge)}

/* ── Selection screens ────────────────────────────────────── */
.sel-block{
  background:var(--board);
  border:2px solid var(--board-edge);
  border-radius:var(--r);
  padding:26px 18px 22px;
  box-shadow:var(--shadow-card);
}
.sel-title{
  text-align:center;
  font-family:'Fraunces',serif;font-weight:600;font-style:italic;
  font-size:1.05rem;letter-spacing:.02em;
  color:var(--face);margin-bottom:20px;
  text-transform:none;
}
.sel-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.sel-card{
  background:var(--face);
  border:1.5px solid var(--board-edge);
  border-radius:var(--r-sm);
  padding:18px 12px;
  cursor:pointer;text-align:center;
  display:flex;flex-direction:column;gap:8px;align-items:center;
  transition:transform .15s ease,box-shadow .15s ease,background .15s;
  min-height:132px;
  box-shadow:0 2px 0 var(--board-edge);
}
.sel-card:hover{background:var(--soft);transform:translateY(-3px);box-shadow:0 5px 0 var(--board-edge)}
.sel-card:active{transform:translateY(0);box-shadow:0 1px 0 var(--board-edge)}
.sel-badge{font-size:2.1rem;line-height:1;filter:saturate(.85)}
.sel-name{
  font-family:'Fraunces',serif;font-weight:800;
  font-size:1.08rem;color:var(--ink);
  letter-spacing:-.01em;line-height:1.1;
}
.sel-desc{font-size:.72rem;color:var(--muted);line-height:1.4;font-weight:500}
.sel-desc b{color:var(--ink);font-weight:700}

/* ── Stats row ────────────────────────────────────────────── */
#stats-row{
  display:flex;gap:18px;
  background:var(--board);
  border:2px solid var(--board-edge);
  border-radius:var(--r);
  padding:16px 18px;
  box-shadow:var(--shadow-card);
}
.ring-wrap{position:relative;width:78px;height:78px;flex-shrink:0}
.ring-wrap svg{width:78px;height:78px;transform:rotate(-90deg)}
.r-bg{fill:none;stroke:rgba(42,32,24,.18);stroke-width:8}
.r-fill{fill:none;stroke:var(--ok);stroke-width:8;stroke-linecap:round;stroke-dasharray:170;stroke-dashoffset:170;transition:stroke-dashoffset .4s ease,stroke .3s}
.ring-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.r-pct{font-family:'Fraunces',serif;font-size:1.3rem;font-weight:800;line-height:1;letter-spacing:-.02em;color:var(--face)}
.r-sub{font-size:.55rem;color:var(--face);opacity:.65;margin-top:3px;text-transform:uppercase;letter-spacing:.08em;font-weight:700}
.stats-right{flex:1;display:flex;flex-direction:column;justify-content:space-between;gap:8px}
.stat-block{display:flex;flex-direction:column;gap:5px}
.stat-lbl{font-size:.7rem;color:var(--face);opacity:.8;display:flex;justify-content:space-between;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.stat-lbl span{font-weight:800;color:var(--face);opacity:1;font-family:'Fraunces',serif;font-size:.85rem;letter-spacing:0;text-transform:none}
.bar-wrap{height:8px;background:rgba(42,32,24,.22);border-radius:4px;position:relative}
.bar-fill{height:100%;border-radius:4px;background:var(--face);transition:width .4s ease,background .3s}
.streak-row{display:flex;align-items:center;gap:10px}
.streak-label{font-size:.7rem;color:var(--face);opacity:.8;text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.sdots{display:flex;gap:6px}
.sdot{width:11px;height:11px;border-radius:50%;background:rgba(42,32,24,.25);transition:background .25s,transform .25s}
.sdot.lit{background:var(--face);transform:scale(1.2);box-shadow:0 0 0 2px rgba(250,243,223,.3)}

/* ── Progress + timer ─────────────────────────────────────── */
#prog-track{display:flex;gap:4px;padding:0 6px}
.pd{flex:1;height:5px;border-radius:3px;background:rgba(42,32,24,.18);transition:background .2s}
.pd.done-ok{background:var(--ok)}
.pd.done-bad{background:var(--bad)}
.pd.cur{background:var(--hand-h)}
#timer-wrap{height:10px;background:rgba(42,32,24,.18);border-radius:5px;overflow:hidden;margin:0 6px;border:1px solid rgba(42,32,24,.12)}
#timer-bar{height:100%;background:var(--ok);width:100%;transition:width .1s linear,background-color .3s}

/* ── Dice area ────────────────────────────────────────────── */
.dice-area{
  display:flex;align-items:center;gap:14px;
  background:var(--board);
  border:2px solid var(--board-edge);
  border-radius:var(--r);
  padding:16px;
  box-shadow:var(--shadow-card);
}
.dice{
  width:88px;height:88px;flex-shrink:0;
  background:var(--face);
  border:1.5px solid var(--board-edge);
  border-radius:var(--r-sm);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'Fraunces',serif;font-weight:900;
  font-size:1.15rem;color:var(--ink);
  box-shadow:inset 0 -4px 0 rgba(122,58,30,.12), 0 3px 0 var(--board-edge);
  transition:transform .6s cubic-bezier(.4,1.8,.4,1);
  gap:3px;
  letter-spacing:-.02em;
}
.dice.rolling{animation:diceRoll .9s ease-in-out}
@keyframes diceRoll{
  0%{transform:rotate(0) scale(1)}
  25%{transform:rotate(180deg) scale(1.08)}
  50%{transform:rotate(360deg) scale(.94)}
  75%{transform:rotate(540deg) scale(1.06)}
  100%{transform:rotate(720deg) scale(1)}
}
.dice-time{font-size:1.25rem;line-height:1}
.dice-period{font-size:.7rem;opacity:.65;font-weight:600;font-family:'Quicksand',sans-serif;text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
#roll-btn{
  flex:1;
  background:var(--hand-m);color:var(--face);
  border:none;border-radius:var(--r-sm);
  padding:16px 18px;font-size:1rem;font-weight:700;
  cursor:pointer;font-family:'Quicksand',sans-serif;
  min-height:62px;
  letter-spacing:.02em;
  box-shadow:0 4px 0 #1a3450, 0 5px 12px rgba(45,74,107,.25);
  transition:transform .08s ease,box-shadow .08s ease;
}
#roll-btn:active{transform:translateY(3px);box-shadow:0 1px 0 #1a3450, 0 2px 4px rgba(45,74,107,.2)}
.target-display{
  font-family:'Fraunces',serif;font-weight:800;
  font-size:1rem;color:var(--ink);
  padding:10px 14px;background:var(--face);
  border-radius:var(--r-sm);
  min-width:92px;text-align:center;
  border:1.5px solid var(--board-edge);
  letter-spacing:-.01em;
  box-shadow:0 2px 0 var(--board-edge);
}

/* ── Clock ────────────────────────────────────────────────── */
.clock-wrap{
  background:var(--board);
  border:3px solid var(--board-edge);
  border-radius:50%;
  padding:8px;
  /* Parent #play is block-layout, so margin:auto handles horizontal centering. */
  margin-left:auto;margin-right:auto;
  align-self:center;
  box-shadow:var(--shadow-deep), inset 0 0 0 6px rgba(122,58,30,.08);
  position:relative;
  width:var(--clock-width);
  aspect-ratio:1;
}
#clock{width:100%;height:100%;display:block;touch-action:none;user-select:none}
.face{fill:var(--face);stroke:var(--board-edge);stroke-width:2.5}
.tick{fill:var(--tick);opacity:.55}
.tick.big{fill:var(--ink);opacity:1}
.tick-num{font-family:'Quicksand',sans-serif;font-size:13px;font-weight:700;fill:var(--muted);text-anchor:middle;dominant-baseline:central;pointer-events:none;letter-spacing:.02em}
.hour-disc{stroke:rgba(42,32,24,.22);stroke-width:1.5}
.hour-num{font-family:'Fraunces',serif;font-size:22px;font-weight:900;fill:var(--face);text-anchor:middle;dominant-baseline:central;pointer-events:none;letter-spacing:-.02em}
#hand-h{stroke:var(--hand-h);stroke-width:14;stroke-linecap:round;cursor:grab;transition:transform .15s ease;filter:drop-shadow(0 1.5px 0 rgba(122,58,30,.25))}
#hand-m{stroke:var(--hand-m);stroke-width:6;stroke-linecap:round;cursor:grab;transition:transform .15s ease;filter:drop-shadow(0 1px 0 rgba(122,58,30,.2))}
.pivot{fill:var(--ink);stroke:var(--face);stroke-width:1.5}
[data-locked="true"]{opacity:.5;cursor:default!important;pointer-events:none}
[data-dragging="true"]{transition:none!important;cursor:grabbing!important}

/* ── Sliders ──────────────────────────────────────────────── */
.sliders{
  align-self:center;
  margin-left:auto;margin-right:auto;
  width:var(--clock-width);
  background:var(--board);
  border:2px solid var(--board-edge);
  border-radius:var(--r);
  padding:22px 16px 18px;
  display:flex;flex-direction:column;gap:18px;
  box-shadow:var(--shadow-card);
}
.rail{
  position:relative;height:52px;
  border-radius:26px;
  background:var(--face);
  border:1.5px solid var(--board-edge);
  box-shadow:inset 0 2px 4px rgba(122,58,30,.1);
  touch-action:none;
  user-select:none;
}
.rail-ticks{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 26px;pointer-events:none;
}
.rail-tick{
  font-family:'Fraunces',serif;
  font-size:.78rem;font-weight:700;color:var(--muted);
  width:28px;text-align:center;
  white-space:nowrap;
  letter-spacing:-.01em;
}
.knob{
  position:absolute;
  width:44px;height:44px;
  border-radius:50%;
  border:2px solid var(--face);
  top:50%;
  transform:translate(-50%,-50%);
  display:flex;align-items:center;justify-content:center;
  color:var(--face);
  font-family:'Fraunces',serif;font-weight:800;font-size:1rem;
  cursor:grab;
  box-shadow:0 3px 8px rgba(42,32,24,.32), 0 0 0 1.5px rgba(42,32,24,.18);
  transition:left .2s ease;
  z-index:2;
  pointer-events:none;
  letter-spacing:-.02em;
}
.hour-knob{background:var(--hand-h)}
.minute-knob{background:var(--hand-m)}
.rail[data-dragging="true"] .knob{transition:none;cursor:grabbing;transform:translate(-50%,-50%) scale(1.14)}
.rail[data-locked="true"]{opacity:.5}
.rail[data-locked="true"] .knob{box-shadow:0 2px 4px rgba(42,32,24,.2)}
.rail-label{
  position:absolute;left:14px;top:-10px;
  font-family:'Quicksand',sans-serif;
  font-size:.62rem;color:var(--face);background:var(--board);
  padding:2px 8px;font-weight:700;letter-spacing:.12em;
  text-transform:uppercase;
  border-radius:3px;
}

/* ── Buttons + feedback ───────────────────────────────────── */
.action-row{display:flex;gap:12px}
#check-btn{
  flex:1;background:var(--ok);color:var(--face);
  border:none;border-radius:var(--r-sm);
  padding:16px;font-size:1.08rem;font-weight:700;
  cursor:pointer;font-family:'Quicksand',sans-serif;
  min-height:62px;
  letter-spacing:.02em;
  box-shadow:0 4px 0 #3e6230, 0 6px 14px rgba(93,138,71,.25);
  transition:transform .08s ease,box-shadow .08s ease;
}
#check-btn:active{transform:translateY(3px);box-shadow:0 1px 0 #3e6230, 0 2px 4px rgba(93,138,71,.2)}
#hint-btn{
  background:var(--face);color:var(--ink);
  border:1.5px solid var(--board-edge);border-radius:var(--r-sm);
  padding:16px 20px;font-size:.95rem;font-weight:700;
  cursor:pointer;font-family:'Quicksand',sans-serif;
  min-height:62px;
  box-shadow:0 3px 0 var(--board-edge);
  transition:transform .08s ease,box-shadow .08s ease;
}
#hint-btn:active{transform:translateY(2px);box-shadow:0 1px 0 var(--board-edge)}
#fb{
  border-radius:var(--r-sm);padding:16px 18px;
  font-size:.94rem;line-height:1.55;display:none;
  font-weight:500;
  background:var(--face);
  border:1.5px solid var(--board-edge);
  box-shadow:var(--shadow-card);
}
#fb.ok{background:#e8f0db;border-color:#3e6230}
#fb.bad{background:#fbe2da;border-color:#7a2818}
#fb.hint{background:#fbeeca;border-color:#a07820}
.fv{
  font-family:'Fraunces',serif;font-weight:800;
  margin-bottom:6px;font-size:1.08rem;
  letter-spacing:-.01em;line-height:1.2;
}
#fb.ok .fv{color:#3e6230}
#fb.bad .fv{color:#7a2818}
#fb.hint .fv{color:#7a5a18}
#fb b{font-weight:700;font-family:'Fraunces',serif}
#next-btn{
  flex:1;
  background:var(--hand-m);color:var(--face);
  border:none;border-radius:var(--r-sm);
  padding:16px;font-size:1.08rem;font-weight:700;
  cursor:pointer;font-family:'Quicksand',sans-serif;
  min-height:62px;display:none;
  letter-spacing:.02em;
  box-shadow:0 4px 0 #1a3450, 0 6px 14px rgba(45,74,107,.25);
  transition:transform .08s ease,box-shadow .08s ease;
}
#next-btn:active{transform:translateY(3px);box-shadow:0 1px 0 #1a3450, 0 2px 4px rgba(45,74,107,.2)}

/* ── Summary ──────────────────────────────────────────────── */
#summary{
  background:var(--board);
  border:2px solid var(--board-edge);
  border-radius:var(--r);
  padding:26px 22px 20px;
  box-shadow:var(--shadow-card);
}
#summary h2{
  font-family:'Fraunces',serif;font-weight:900;
  font-size:1.55rem;margin-bottom:22px;
  color:var(--face);text-align:center;
  letter-spacing:-.02em;line-height:1.1;
}
.sum-hero{display:flex;gap:22px;align-items:center;margin-bottom:22px}
.sum-ring{position:relative;width:108px;height:108px;flex-shrink:0}
.sum-ring svg{width:108px;height:108px;transform:rotate(-90deg)}
.sr-bg{fill:none;stroke:rgba(42,32,24,.22);stroke-width:9}
.sr-fill{fill:none;stroke-width:9;stroke-linecap:round;stroke-dasharray:220;stroke-dashoffset:220;transition:stroke-dashoffset .9s ease,stroke .3s}
.sum-ring-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.srl-pct{font-family:'Fraunces',serif;font-size:1.65rem;font-weight:900;color:var(--face);letter-spacing:-.03em;line-height:1}
.srl-sub{font-size:.6rem;color:var(--face);opacity:.7;margin-top:4px;text-transform:uppercase;letter-spacing:.1em;font-weight:700}
.sum-stats{flex:1;display:flex;flex-direction:column;gap:9px}
.ss-row{display:flex;justify-content:space-between;align-items:baseline;font-size:.92rem;color:var(--face)}
.ss-k{color:var(--face);opacity:.75;font-weight:500}
.ss-v{font-family:'Fraunces',serif;font-weight:800;color:var(--face);font-size:1rem;letter-spacing:-.01em}
.error-chart{display:flex;flex-direction:column;gap:7px;margin-bottom:18px}
.error-row{display:flex;align-items:center;gap:10px;font-size:.88rem;padding:10px 14px;background:var(--face);border-radius:var(--r-xs);border:1px solid rgba(122,58,30,.2)}
.error-key{flex:1;color:var(--muted);font-weight:500}
.error-cnt{font-family:'Fraunces',serif;font-weight:800;color:var(--ink);font-size:1.05rem}
.vbanner{border-radius:var(--r-sm);padding:18px;font-size:.96rem;margin-bottom:16px;background:var(--face);border:1.5px solid var(--board-edge);line-height:1.5;color:var(--ink);box-shadow:0 2px 0 var(--board-edge)}
.vbanner strong{font-family:'Fraunces',serif;font-weight:900;font-size:1.08rem;letter-spacing:-.01em}
.vbanner b{font-family:'Fraunces',serif;font-weight:700}
.restart-btn{
  width:100%;background:var(--face);
  border:1.5px solid var(--board-edge);
  border-radius:var(--r-sm);padding:15px;
  color:var(--ink);font-size:.96rem;font-weight:700;
  cursor:pointer;font-family:'Quicksand',sans-serif;
  margin-top:10px;min-height:56px;
  box-shadow:0 3px 0 var(--board-edge);
  transition:transform .08s ease,box-shadow .08s ease;
  letter-spacing:.01em;
}
.restart-btn:hover{background:var(--soft)}
.restart-btn:active{transform:translateY(2px);box-shadow:0 1px 0 var(--board-edge)}

/* ── Play-screen column wrappers ──────────────────────────── */
/* On mobile they vanish so the existing single-column stack is unchanged;
   the desktop media query below promotes them to flex columns. */
.play-left,.play-right{display:contents}

/* ── Desktop ──────────────────────────────────────────────── */
/* Two-column play layout — fits on one screen without scrolling.
   Left column: progress/timer/stats/dice/actions/feedback (question + status).
   Right column: clock + sliders (visualisation + input). */
@media(min-width:900px){
  :root{--clock-width:min(340px,40vh)}
  body{font-size:16px}
  .board{
    max-width:1040px;
    padding:64px 22px 18px;
    gap:14px;
    min-height:0;
  }
  /* Dissolve the header bar into floating HUD chips at the top corners.
     The bar background/border vanishes; each child becomes its own pill.
     Title is anchored center; the right cluster groups via margin-left:auto. */
  .hdr{
    position:fixed;
    top:14px;left:16px;right:16px;
    background:transparent;border:none;box-shadow:none;padding:0;
    justify-content:flex-start;
    align-items:center;
    gap:10px;
    pointer-events:none;
    z-index:5;
  }
  .hdr > *{pointer-events:auto;flex:0 0 auto}
  .back-btn{
    background:var(--face);
    border:1.5px solid var(--board-edge);
    border-radius:999px;
    padding:6px 14px;
    box-shadow:var(--shadow-card);
  }
  .back-btn a{opacity:1;font-size:.85rem}
  .gym-title{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    background:var(--face);
    border:1.5px solid var(--board-edge);
    border-radius:999px;
    padding:6px 18px;
    box-shadow:var(--shadow-card);
    font-size:1.05rem;
    line-height:1.2;
  }
  /* Push locale + voice + mode-pill into a right-anchored cluster. */
  #locale-toggle{margin-left:auto}
  /* Pickers laid out as a single row of 4 to keep the choose-screen above the fold. */
  .sel-grid{grid-template-columns:repeat(4,1fr)}
  .sel-card{min-height:118px;padding:14px 10px}
  .sel-block{padding:20px 18px}

  /* :not([hidden]) so an explicit display rule doesn't defeat the hidden attribute. */
  #play:not([hidden]){
    display:grid;
    grid-template-columns:minmax(260px,1fr) var(--clock-width);
    column-gap:26px;
    align-items:center;
    justify-content:center;
  }
  .play-left,.play-right{
    display:flex;flex-direction:column;
    justify-content:center;
    gap:12px;
    min-width:0;
  }
  .clock-wrap{margin:0;align-self:center}
  .sliders{margin:0;padding:18px 14px 14px;gap:14px}
  .sliders .rail{height:46px}
  .knob{width:40px;height:40px;font-size:.95rem}
  #stats-row{padding:12px 16px}
  .ring-wrap,.ring-wrap svg{width:68px;height:68px}
  .r-pct{font-size:1.15rem}
  .dice-area{padding:12px 14px;gap:12px}
  .dice{width:74px;height:74px}
  .dice-time{font-size:1.05rem}
  #roll-btn{padding:13px;font-size:.94rem;min-height:54px}
  .target-display{font-size:.9rem;padding:8px 12px;min-width:78px}
  #check-btn,#next-btn{padding:13px;font-size:1rem;min-height:54px}
  #hint-btn{padding:13px 18px;font-size:.9rem;min-height:54px}
  #fb{padding:12px 16px;font-size:.9rem}
}

/* ── Mobile ───────────────────────────────────────────────── */
@media(max-width:480px){
  body{font-size:15px}
  .board{padding:14px 10px 28px;padding-top:130px;gap:12px}
  .gym-title{font-size:1.2rem}
  .hdr{padding:11px 14px}
  .sel-block{padding:20px 14px}
  .sel-card{min-height:118px;padding:14px 10px}
  .sel-name{font-size:.98rem}
  .sel-desc{font-size:.68rem}
  .sel-badge{font-size:1.75rem}
  .dice-area{padding:12px;gap:10px}
  .dice{width:72px;height:72px}
  .dice-time{font-size:1rem}
  .dice-period{font-size:.6rem}
  .target-display{font-size:.85rem;padding:8px 11px;min-width:72px}
  #roll-btn{padding:13px;font-size:.94rem;min-height:54px}
  .rail{height:48px}
  .rail-tick{font-size:.68rem;width:20px}
  .knob{width:40px;height:40px;font-size:.92rem}
  .rail-ticks{padding:0 22px}
  #check-btn,#next-btn{padding:14px;font-size:1rem;min-height:56px}
  #hint-btn{padding:14px 16px;font-size:.92rem;min-height:56px}
  .ring-wrap,.ring-wrap svg{width:68px;height:68px}
  .r-pct{font-size:1.15rem}
}
</style>
</head>
<body>

<!-- ── Sky background ─────────────────────────────────────── -->
<div class="sky" aria-hidden="true">
  <svg class="stars-svg" viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid slice">
    <g id="stars"></g>
  </svg>
  <div id="sun" class="celestial-body hidden">
    <svg viewBox="-70 -70 140 140">
      <defs>
        <radialGradient id="sunGlow">
          <stop offset="0%" stop-color="#ffd54f" stop-opacity="0.55"/>
          <stop offset="40%" stop-color="#ffd54f" stop-opacity="0.28"/>
          <stop offset="100%" stop-color="#ffd54f" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <circle r="65" fill="url(#sunGlow)"/>
      <circle r="26" fill="#ffd54f"/>
    </svg>
  </div>
  <div id="moon" class="celestial-body hidden">
    <svg viewBox="-50 -50 100 100">
      <defs>
        <radialGradient id="moonGlow">
          <stop offset="0%" stop-color="#fff8dc" stop-opacity="0.45"/>
          <stop offset="100%" stop-color="#fff8dc" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <circle r="48" fill="url(#moonGlow)"/>
      <circle r="20" fill="#fff8dc"/>
      <circle cx="-6" cy="-4" r="3" fill="rgba(0,0,0,.13)"/>
      <circle cx="5" cy="6" r="2.5" fill="rgba(0,0,0,.13)"/>
      <circle cx="-2" cy="8" r="1.8" fill="rgba(0,0,0,.13)"/>
    </svg>
  </div>
</div>

<!-- ── Board (foreground) ─────────────────────────────────── -->
<div class="board">

  <div class="hdr">
    <div class="back-btn"><a href="index.html" data-i18n="app.back">← Gyms</a></div>
    <div class="gym-title">⏰ <span data-i18n="app.title">Clock Toy</span></div>
    <button id="locale-toggle" class="locale-toggle" type="button" aria-label="Language">EN</button>
    <button id="voice-toggle" class="voice-toggle" type="button" aria-label="Voice">🔊</button>
    <div class="mode-pill" id="mode-pill" data-i18n="app.chooseMode">Choose Mode</div>
  </div>

  <div id="mode-sel" class="sel-block">
    <div class="sel-title" data-i18n="picker.pickMode">Pick a mode</div>
    <div class="sel-grid" id="mode-grid"></div>
  </div>

  <div id="diff-sel" class="sel-block" hidden>
    <div class="sel-title" data-i18n="picker.pickDifficulty">Pick a difficulty</div>
    <div class="sel-grid" id="diff-grid"></div>
    <button class="restart-btn" style="margin-top:14px" data-i18n="picker.backToModes">↩ Back to modes</button>
  </div>

  <div id="play" hidden>
    <div class="play-left">
      <div id="prog-track"></div>
      <div id="timer-wrap"><div id="timer-bar"></div></div>

      <div id="stats-row">
        <div class="ring-wrap">
          <svg viewBox="0 0 70 70"><circle class="r-bg" cx="35" cy="35" r="27"/><circle class="r-fill" id="r-fill" cx="35" cy="35" r="27"/></svg>
          <div class="ring-label"><div class="r-pct" id="r-pct">—</div><div class="r-sub" data-i18n="stats.correct">correct</div></div>
        </div>
        <div class="stats-right">
          <div class="stat-block">
            <div class="stat-lbl"><span data-i18n="stats.timePerRound">time per round</span> <span id="lat-txt">—</span></div>
            <div class="bar-wrap"><div class="bar-fill" id="lat-bar" style="width:0%"></div></div>
          </div>
          <div class="streak-row">
            <div class="streak-label" data-i18n="stats.streak">streak</div>
            <div class="sdots" id="sdots"></div>
          </div>
        </div>
      </div>

      <div class="dice-area">
        <div class="dice" id="dice"><div class="dice-time">?</div><div class="dice-period">roll!</div></div>
        <button id="roll-btn" data-i18n="buttons.roll">🎲 Roll!</button>
        <div class="target-display" id="target-display">—</div>
      </div>

      <div class="action-row">
        <button id="hint-btn" style="display:none" data-i18n="buttons.hint">💡 Hint</button>
        <button id="check-btn" data-i18n="buttons.check">✓ Check!</button>
        <button id="next-btn" data-i18n="buttons.next">Next →</button>
      </div>
      <div id="fb"></div>
    </div>

    <div class="play-right">
      <div class="clock-wrap">
        <svg id="clock" viewBox="0 0 400 400"></svg>
      </div>

      <div class="sliders">
        <div class="rail" id="hour-rail">
          <span class="rail-label" data-i18n="rails.hour">HOUR</span>
          <div class="rail-ticks" id="hour-ticks"></div>
          <div class="knob hour-knob" id="hour-knob">12</div>
        </div>
        <div class="rail" id="minute-rail">
          <span class="rail-label" data-i18n="rails.minute">MINUTE</span>
          <div class="rail-ticks" id="minute-ticks"></div>
          <div class="knob minute-knob" id="minute-knob">0</div>
        </div>
      </div>
    </div>
  </div>

  <div id="summary" hidden></div>

</div>

<script type="module" src="src/main.js"></script>
</body>
</html>
